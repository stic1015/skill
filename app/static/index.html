<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SkillMD 能力生成器 MVP</title>
  <style>
    :root {
      --bg: #f4f2eb;
      --panel: #fffdfa;
      --ink: #1f2933;
      --muted: #52606d;
      --accent: #0b6e4f;
      --accent-soft: #cde6dd;
      --border: #d9d5ca;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      color: var(--ink);
      background: radial-gradient(circle at 20% 20%, #fff8ef 0%, var(--bg) 56%);
      min-height: 100vh;
    }
    .wrap {
      max-width: 1080px;
      margin: 24px auto 40px;
      padding: 0 16px;
      display: grid;
      gap: 16px;
    }
    .panel {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 18px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.04);
    }
    h1 {
      margin: 0 0 8px;
      font-size: 28px;
      letter-spacing: 0.3px;
    }
    p { margin: 0; color: var(--muted); }
    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }
    .full { grid-column: 1 / -1; }
    label {
      display: block;
      font-size: 13px;
      margin-bottom: 6px;
      color: var(--muted);
    }
    input, textarea {
      width: 100%;
      border: 1px solid var(--border);
      background: #ffffff;
      border-radius: 10px;
      padding: 10px 12px;
      color: var(--ink);
      font-size: 14px;
    }
    textarea { min-height: 86px; resize: vertical; }
    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 8px;
    }
    button {
      border: 0;
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 14px;
      cursor: pointer;
      background: var(--accent);
      color: #fff;
    }
    button.secondary {
      background: var(--accent-soft);
      color: #134e3a;
    }
    pre {
      margin: 0;
      border-radius: 10px;
      background: #0d1117;
      color: #dbe4f0;
      padding: 14px;
      overflow: auto;
      max-height: 440px;
    }
    @media (max-width: 800px) { .grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <div class="wrap">
    <section class="panel">
      <h1>SkillMD 能力生成器</h1>
      <p>输入结构化 Brief，生成 Skill 草稿、校验质量，并一键创建发布分支。</p>
    </section>

    <section class="panel">
      <div class="grid">
        <div class="full">
          <label for="business_goal">业务目标</label>
          <textarea id="business_goal" placeholder="例如：减少客服重复问答处理时间，沉淀可复用 SOP"></textarea>
        </div>
        <div>
          <label for="applicable_scenarios">适用场景（每行一条）</label>
          <textarea id="applicable_scenarios" placeholder="售前问答&#10;需求澄清"></textarea>
        </div>
        <div>
          <label for="trigger_phrases">触发词（每行一条）</label>
          <textarea id="trigger_phrases" placeholder="写一个报价回复&#10;客户异议处理"></textarea>
        </div>
        <div>
          <label for="input_materials">输入材料（每行一条）</label>
          <textarea id="input_materials" placeholder="产品资料&#10;历史会话"></textarea>
        </div>
        <div>
          <label for="expected_outputs">输出期望（每行一条）</label>
          <textarea id="expected_outputs" placeholder="结构化回复模板&#10;行动建议"></textarea>
        </div>
        <div>
          <label for="boundaries">边界（每行一条）</label>
          <textarea id="boundaries" placeholder="只回答产品范围内问题"></textarea>
        </div>
        <div>
          <label for="forbidden_scenarios">禁用场景（每行一条）</label>
          <textarea id="forbidden_scenarios" placeholder="法律/医疗建议"></textarea>
        </div>
        <div>
          <label for="example_requests">示例问法（每行一条）</label>
          <textarea id="example_requests" placeholder="帮我写一段客户跟进话术"></textarea>
        </div>
        <div>
          <label for="api_base">后端 API Base（可填内网映射 URL）</label>
          <input id="api_base" placeholder="https://your-tunnel.example.com" />
        </div>
        <div>
          <label for="draft_id">Draft ID（校验/发布时可选）</label>
          <input id="draft_id" placeholder="自动回填" />
        </div>
        <div>
          <label for="target_repo">目标仓库路径（发布时必填）</label>
          <input id="target_repo" placeholder="D:\skills-registry" />
        </div>
      </div>
      <div class="actions">
        <button id="btnDraft">生成草稿</button>
        <button id="btnValidate" class="secondary">校验草稿</button>
        <button id="btnPublish">发布 PR 草稿分支</button>
      </div>
    </section>

    <section class="panel">
      <pre id="output">等待操作...</pre>
    </section>
  </div>

  <script>
    const output = document.getElementById("output");
    let lastDraft = null;
    const API_BASE_STORAGE_KEY = "skillmd_api_base";

    function normalizeBaseUrl(value) {
      const v = (value || "").trim().replace(/\/+$/, "");
      return v;
    }

    function loadApiBase() {
      const params = new URLSearchParams(window.location.search);
      const fromQuery = normalizeBaseUrl(params.get("api_base"));
      if (fromQuery) {
        localStorage.setItem(API_BASE_STORAGE_KEY, fromQuery);
        return fromQuery;
      }
      const fromStorage = normalizeBaseUrl(localStorage.getItem(API_BASE_STORAGE_KEY) || "");
      if (fromStorage) return fromStorage;
      return normalizeBaseUrl(window.location.origin);
    }

    function apiUrl(path) {
      const base = normalizeBaseUrl(document.getElementById("api_base").value || window.location.origin);
      return `${base}${path}`;
    }

    function readLines(id) {
      return document.getElementById(id).value
        .split(/\r?\n/)
        .map((v) => v.trim())
        .filter(Boolean);
    }

    function buildBrief() {
      return {
        business_goal: document.getElementById("business_goal").value.trim(),
        applicable_scenarios: readLines("applicable_scenarios"),
        trigger_phrases: readLines("trigger_phrases"),
        input_materials: readLines("input_materials"),
        expected_outputs: readLines("expected_outputs"),
        boundaries: readLines("boundaries"),
        forbidden_scenarios: readLines("forbidden_scenarios"),
        example_requests: readLines("example_requests"),
        language: "zh-CN"
      };
    }

    async function postJson(url, payload) {
      const res = await fetch(apiUrl(url), {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload)
      });
      const data = await res.json();
      if (!res.ok) {
        throw new Error(JSON.stringify(data, null, 2));
      }
      return data;
    }

    function print(data) {
      output.textContent = JSON.stringify(data, null, 2);
    }

    function persistApiBase() {
      const base = normalizeBaseUrl(document.getElementById("api_base").value);
      if (base) {
        localStorage.setItem(API_BASE_STORAGE_KEY, base);
      }
    }

    document.getElementById("api_base").value = loadApiBase();
    document.getElementById("api_base").addEventListener("blur", persistApiBase);

    document.getElementById("btnDraft").addEventListener("click", async () => {
      try {
        const data = await postJson("/api/skills/draft", buildBrief());
        persistApiBase();
        lastDraft = data;
        if (data.draft_id) {
          document.getElementById("draft_id").value = data.draft_id;
        }
        print(data);
      } catch (err) {
        output.textContent = String(err.message || err);
      }
    });

    document.getElementById("btnValidate").addEventListener("click", async () => {
      try {
        const draftId = document.getElementById("draft_id").value.trim();
        const payload = draftId
          ? { draft_id: draftId }
          : (lastDraft ? lastDraft : {});
        const data = await postJson("/api/skills/validate", payload);
        persistApiBase();
        print(data);
      } catch (err) {
        output.textContent = String(err.message || err);
      }
    });

    document.getElementById("btnPublish").addEventListener("click", async () => {
      try {
        const draftId = document.getElementById("draft_id").value.trim();
        const targetRepo = document.getElementById("target_repo").value.trim();
        const payload = { draft_id: draftId, target_repo: targetRepo, base_branch: "main" };
        const data = await postJson("/api/skills/publish-pr", payload);
        persistApiBase();
        print(data);
      } catch (err) {
        output.textContent = String(err.message || err);
      }
    });
  </script>
</body>
</html>
